    /* 列表面板 */
    .list-panel{padding:22px 16px 14px}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:6px}table{width:100%;min-width:1200px;border-collapse:collapse;table-layout:fixed}thead th{height:56px;padding:0 14px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);text-align:left;font-weight:700;white-space:nowrap}tbody td{padding:12px 14px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);vertical-align:middle;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#405066}thead th:last-child,tbody td:last-child{border-right:none}tbody tr:hover{background:#dff3ff}.table-actions{display:flex;flex-direction:column;gap:4px}.table-link{color:var(--brand);text-decoration:none;cursor:pointer}

    const monthDays=["一","二","三","四","五","六","日"],$=id=>document.getElementById(id),tableBody=$("tableBody"),summary=$("summary"),pageNumbers=$("pageNumbers"),operatorName=$("operatorName"),activityCode=$("activityCode"),activityTitle=$("activityTitle"),activityType=$("activityType"),statusSel=$("status"),pageSizeSel=$("pageSize"),pageJump=$("pageJump"),rangeIcon=$("rangeIcon"),totalParticipants=$("totalParticipants"),totalCompleted=$("totalCompleted"),avgCompletionRate=$("avgCompletionRate");

    function updateSummary(){

    }
    const fmt=d=>d?`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`:"",parse=s=>new Date(`${s}T00:00:00`),viewStart=()=>pendingStart||start,same=(a,b)=>a&&b&&fmt(a)===fmt(b),inRange=d=>viewStart()&&end&&d>viewStart()&&d<end;
    function syncRange(){$("startDate").value=fmt(start);$("endDate").value=fmt(end);$("startDate").classList.toggle("active",selecting==="start");$("endDate").classList.toggle("active",selecting==="end");rangeIcon.textContent="🗓";rangeIcon.classList.toggle("clearable",!!(start&&end))}
    function renderCal(el,date,side){

      const right=side==="right"?'<div class="calendar-nav"><span id="nextMonth">&rsaquo;</span><span id="nextYear">&raquo;</span></div>':'<div class="calendar-nav"></div>';
      let html=`<div class="calendar-head">${left}<div>${y}年 ${m+1}月</div>${right}</div><div class="weekday-row">${monthDays.map(d=>`<div>${d}</div>`).join("")}</div><div class="days-grid">`;
      for(let i=0;i<42;i++){const d=new Date(grid);d.setDate(grid.getDate()+i);const cls=["day"];if(d.getMonth()!==m)cls.push("muted");if(same(d,viewStart())||same(d,end))cls.push("selected");if(inRange(d))cls.push("in-range");html+=`<div class="${cls.join(" ")}" data-date="${fmt(d)}">${d.getDate()}</div>`}
      el.innerHTML=html+"</div>";
    }
    function renderCals(){
      renderCal($("leftCalendar"),base,"left");renderCal($("rightCalendar"),new Date(base.getFullYear(),base.getMonth()+1,1),"right");
      [["prevYear",-12],["prevMonth",-1],["nextMonth",1],["nextYear",12]].forEach(([id,delta])=>{const n=$(id);if(n)n.onclick=()=>{base=new Date(base.getFullYear(),base.getMonth()+delta,1);renderCals()}});
      document.querySelectorAll(".day").forEach(d=>d.onclick=()=>{const pick=parse(d.dataset.date);if(selecting==="start"){pendingStart=pick;selecting="end"}else{if(pendingStart&&pick<pendingStart){pendingStart=pick}else{start=pendingStart||pick;end=pick;pendingStart=null;selecting="start";$("datePanel").classList.remove("open")}}syncRange();renderCals()})
    }
    function pages(total){
      if(total<=7)return Array.from({length:total},(_,i)=>i+1);if(page<=4)return[1,2,3,4,5,"...",total];if(page>=total-3)return[1,"...",total-4,total-3,total-2,total-1,total];return[1,"...",page-1,page,page+1,"...",total];
    }
    function render(){
      tableBody.innerHTML="";summary.textContent=`共 ${filtered.length} 条`;if(!filtered.length){pageNumbers.innerHTML='<span class="page-btn active">1</span>';return}
      const total=Math.max(1,Math.ceil(filtered.length/pageSize));if(page>total)page=total;const list=filtered.slice((page-1)*pageSize,page*pageSize);
      pageNumbers.innerHTML=pages(total).map(p=>p==="..."?'<span>…</span>':`<span class="page-btn${p===page?" active":""}" data-page="${p}">${p}</span>`).join("");
      list.forEach(r=>{
        const score=r[3]==='健步走'?`${(r[5]*10000).toLocaleString()} 步`:`${r[5]} 分`;
        const time=r[3]==='健步走'?'-':`${Math.floor(Math.random()*30)+5}:${String(Math.floor(Math.random()*60)).padStart(2,'0')}`;
        tableBody.innerHTML+=`<tr><td title="${r[1]}">${r[1]}</td><td title="${r[2]}">${r[2]}</td><td>${r[3]}</td><td>${r[4]}</td><td title="${r[0]}">${r[0]}</td><td>${r[5]}</td><td>${r[6]}</td><td>${r[7]>0?r[7]+'%':'-'}</td><td><div class="table-actions"><a class="table-link" onclick="showRank('${r[0]}','${r[2]}','${r[3]}','${r[1]}')">查看排行榜</a><a class="table-link" onclick="exportRank('${r[0]}','${r[2]}','${r[3]}','${r[1]}')">导出排行榜</a></div></td></tr>`
      });
      pageNumbers.querySelectorAll("[data-page]").forEach(n=>n.onclick=()=>{page=Number(n.dataset.page);render()});$("prevPage").style.opacity=page===1?.45:1;$("nextPage").style.opacity=page===total?.45:1;
    }
    function applyFilters(){
      const op=operatorName.value.trim().toLowerCase(),code=activityCode.value.trim().toLowerCase(),title=activityTitle.value.trim().toLowerCase(),type=activityType.value,st=statusSel.value;
      filtered=rows.filter(r=>{return(!op||r[0].toLowerCase().includes(op))&&(!code||r[1].toLowerCase().includes(code))&&(!title||r[2].toLowerCase().includes(title))&&(type==="all"||r[3]===type)&&(st==="all"||r[4]===st)});
      page=1;render();
    }
    $("rangeTrigger").onclick=()=>{$("datePanel").classList.toggle("open");renderCals()};
    $("startDate").onclick=e=>{e.stopPropagation();pendingStart=null;selecting="start";syncRange();$("datePanel").classList.add("open");renderCals()};
    $("endDate").onclick=e=>{e.stopPropagation();pendingStart=start;selecting="end";syncRange();$("datePanel").classList.add("open");renderCals()};
    rangeIcon.onmouseenter=()=>{if(start&&end)rangeIcon.textContent="✕"};
    rangeIcon.onmouseleave=()=>{if(start&&end)rangeIcon.textContent="🗓"};
    rangeIcon.onclick=e=>{if(start&&end){e.stopPropagation();start=null;end=null;pendingStart=null;selecting="start";$("datePanel").classList.remove("open");syncRange();renderCals()}};
    document.addEventListener("click",e=>{if(!$("datePanel").contains(e.target)&&!$("rangeTrigger").contains(e.target)){$("datePanel").classList.remove("open")}});
    $("queryBtn").onclick=applyFilters;
    $("prevPage").onclick=()=>{if(page>1){page--;render()}};
    $("nextPage").onclick=()=>{const total=Math.max(1,Math.ceil(filtered.length/pageSize));if(page<total){page++;render()}};
    pageSizeSel.onchange=()=>{pageSize=Number(pageSizeSel.value);page=1;render()};
    pageJump.onkeydown=e=>{if(e.key==="Enter"){const total=Math.max(1,Math.ceil(filtered.length/pageSize)),target=Number(pageJump.value);if(target>=1&&target<=total){page=target;render()}}};
    
    // 排行榜弹窗
    let currentOperator='',currentActivity='',currentType='',currentCode='',currentRankPage=1,currentRankPageSize=10;
    
    // 模拟排行榜数据
    const rankData={};
    rows.forEach(r=>{
      const names=['张三','李四','王五','赵六','孙七','周八','吴九','郑十','钱十一','刘十二','冯十三','陈十四'];
      rankData[r[1]]=names.map((name,i)=>({
        rank:i+1,nickname:name,phone:'138****'+String(1000+i),
        score:r[3]==='健步走'?((12-i)*10000+Math.floor(Math.random()*5000)).toLocaleString()+' 步':(100-i*3)+' 分',
        duration:r[3]==='健步走'?`${15-i}天${8+i}小时`:`${5+i}:${String(Math.floor(Math.random()*60)).padStart(2,'0')}`
      }));
    });
    
    function showRank(operator,name,type,code){
      currentOperator=operator;currentActivity=name;currentType=type;currentCode=code;currentRankPage=1;currentRankPageSize=10;
      $('modalTitle').textContent=`🏆 ${operator}_${name} - 排行榜`;
      if(type==='健步走'){
        $('scoreHeader').textContent='总步数';
        $('durationHeader').style.display='none';
      }else{
        $('scoreHeader').textContent='分数';
        $('durationHeader').style.display='';
      }
      renderRankTable();
      $('rankModal').classList.add('show');
    }
    
    function renderRankTable(){
      const ranks=rankData[currentCode]||[];
      const rankTableBody=$('rankTableBody');
      const rankSummary=$('rankSummary');
      if(ranks.length===0){
        rankSummary.textContent='共 0 条';
        rankTableBody.innerHTML='<tr><td colspan="5" style="text-align:center;color:#8b98ab;padding:40px">暂无数据</td></tr>';
        $('rankPageNumbers').innerHTML='';
        return;
      }
      rankSummary.textContent=`共 ${ranks.length} 条`;
      const total=Math.ceil(ranks.length/currentRankPageSize);
      if(currentRankPage>total)currentRankPage=total;
      if(currentRankPage<1)currentRankPage=1;
      const start=(currentRankPage-1)*currentRankPageSize;
      const end=start+currentRankPageSize;
      const pageData=ranks.slice(start,end);
      rankTableBody.innerHTML=pageData.map(item=>{
        const badge=item.rank===1?'<span class="rank-badge gold">1</span>':item.rank===2?'<span class="rank-badge silver">2</span>':item.rank===3?'<span class="rank-badge bronze">3</span>':`<span class="rank-number">${item.rank}</span>`;
        return`<tr><td class="rank-number">${badge}</td><td>${item.nickname}</td><td>${item.phone}</td><td class="rank-score">${item.score}</td>${currentType!=='健步走'?`<td>${item.duration}</td>`:''}</tr>`;
      }).join('');
      renderRankPagination(total);
      $('rankPrevPage').style.opacity=currentRankPage===1?'0.45':'1';
      $('rankNextPage').style.opacity=currentRankPage===total?'0.45':'1';
    }
    
    function renderRankPagination(total){
      const html=total<=7?Array.from({length:total},(_,i)=>`<span class="page-btn${i+1===currentRankPage?' active':''}" onclick="goToRankPage(${i+1})">${i+1}</span>`).join(''):
        currentRankPage<=4?[1,2,3,4,5,'...',total].map(p=>p==='...'?'<span>…</span>':`<span class="page-btn${p===currentRankPage?' active':''}" onclick="goToRankPage(${p})">${p}</span>`).join(''):
        currentRankPage>=total-3?[1,'...',total-4,total-3,total-2,total-1,total].map(p=>p==='...'?'<span>…</span>':`<span class="page-btn${p===currentRankPage?' active':''}" onclick="goToRankPage(${p})">${p}</span>`).join(''):
        [1,'...',currentRankPage-1,currentRankPage,currentRankPage+1,'...',total].map(p=>p==='...'?'<span>…</span>':`<span class="page-btn${p===currentRankPage?' active':''}" onclick="goToRankPage(${p})">${p}</span>`).join('');
      $('rankPageNumbers').innerHTML=html;
    }
    
    function goToRankPage(page){currentRankPage=page;renderRankTable();}
    
    $('rankPrevPage').addEventListener('click',()=>{if(currentRankPage>1){currentRankPage--;renderRankTable()}});
    $('rankNextPage').addEventListener('click',()=>{const total=Math.ceil((rankData[currentCode]||[]).length/currentRankPageSize);if(currentRankPage<total){currentRankPage++;renderRankTable()}});
    $('rankPageSize').addEventListener('change',function(){currentRankPageSize=Number(this.value);currentRankPage=1;renderRankTable()});
    $('rankJump').addEventListener('keydown',function(e){if(e.key==='Enter'){const total=Math.ceil((rankData[currentCode]||[]).length/currentRankPageSize);const target=Number(this.value);if(target>=1&&target<=total){currentRankPage=target;renderRankTable()}}});
    
    function closeRankModal(){$('rankModal').classList.remove('show');}
    
    function exportRank(operator,name,type,code){
      const op = operator || currentOperator;
      const act = name || currentActivity;
      const t = type || currentType;
      const c = code || currentCode;
      
      const ranks = rankData[c] || [];
      if(ranks.length === 0){
        alert('暂无排行榜数据可导出');
        return;
      }
      
      const scoreTitle = t === '健步走' ? '总步数' : '分数';
      let csv = `\uFEFF排名,昵称,手机号,${scoreTitle}`;
      if(t !== '健步走'){
        csv += `,用时`;
      }
      csv += `\n`;
      
      ranks.forEach(item => {
        csv += `${item.rank},${item.nickname},${item.phone},${item.score}`;
        if(t !== '健步走'){
          csv += `,${item.duration || '-'}`;
        }
        csv += `\n`;
      });
      
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const date = String(now.getDate()).padStart(2, '0');
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      const timeStr = `${year}${month}${date}_${hours}${minutes}${seconds}`;
      
      const fileName = `${op}_${act}_排行榜_${timeStr}.csv`;
      
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = fileName;
      link.click();
      URL.revokeObjectURL(link.href);
    }
    
    $('rankModal').addEventListener('click',function(e){if(e.target===this)closeRankModal()});
    document.addEventListener('keydown',function(e){if(e.key==='Escape')closeRankModal()});
    
    syncRange();renderCals();updateSummary();render();
  </script>
</body>
</html>
