<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>5.3.6 答题历史 - 淘福客</title>
<style>
  :root {
    --primary-red: #e64340;
    --bg-color: #F7F8FA;
    --card-bg: #FFFFFF;
    --text-main: #1D1E20;
    --text-sub: #8A8F99;
    --border-color: #EBEDF0;
    --safe-area-top: 44px;
    --safe-area-bottom: 34px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background-color: #e0e0e0; display: flex; justify-content: center;
    align-items: center; min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, "PingFang SC", sans-serif;
  }
  
  .iphone-mockup {
    width: 393px; height: 852px; background: var(--bg-color);
    border-radius: 55px; box-shadow: 0 0 0 12px #000, 0 0 0 13px #333, 0 20px 40px rgba(0,0,0,0.2);
    position: relative; overflow: hidden; display: flex; flex-direction: column;
  }
  
  .dynamic-island {
    position: absolute; top: 11px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 35px; background: #000; border-radius: 20px; z-index: 100;
  }

  .mini-program-header {
    padding-top: var(--safe-area-top); height: calc(44px + var(--safe-area-top));
    background: #fff; display: flex; align-items: center; justify-content: center;
    position: relative; z-index: 10; border-bottom: 0.5px solid var(--border-color);
  }
  .header-back {
    position: absolute; left: 15px; top: calc(var(--safe-area-top) + 6px);
    width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .header-back::after {
    content: ''; width: 10px; height: 10px; border-left: 2px solid var(--text-main); border-bottom: 2px solid var(--text-main); transform: rotate(45deg);
  }
  .mini-program-title { font-size: 16px; font-weight: 600; color: var(--text-main); }
  .mini-program-capsule {
    position: absolute; right: 15px; top: calc(var(--safe-area-top) + 6px);
    width: 87px; height: 32px; border-radius: 16px; background: rgba(0,0,0,0.05); border: 0.5px solid rgba(0,0,0,0.1);
  }

  .content-scroll {
    flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 16px; padding-bottom: calc(40px + var(--safe-area-bottom));
  }

  /* ====== 优化后的流水单式卡片 ====== */
  .history-card {
    background: var(--card-bg); border-radius: 16px; padding: 20px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.03); margin-bottom: 16px;
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; transition: transform 0.2s; border: 1px solid transparent;
  }
  .history-card:active { transform: scale(0.98); background: #fcfcfc; border-color: #eee;}

  .card-left { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  
  .info-line { display: flex; align-items: baseline; font-size: 14px; }
  .info-label { color: var(--text-sub); width: 75px; flex-shrink: 0; }
  .info-val { color: var(--text-main); font-weight: 500; }
  /* 分数和用时使用同级的数字字体加粗展示 */
  .info-val.num { font-family: 'DIN Alternate', sans-serif; font-size: 16px; letter-spacing: 0.5px; }

  /* 右侧的查看成绩和箭头 */
  .card-right {
    display: flex; align-items: center; gap: 4px; color: var(--text-sub); font-size: 13px;
    padding-left: 12px;
  }
  .arrow {
    width: 6px; height: 6px; border-top: 1.5px solid currentColor; border-right: 1.5px solid currentColor;
    transform: rotate(45deg); margin-top: 1px;
  }

  .home-indicator {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 134px; height: 5px; background: #000; border-radius: 100px; z-index: 101;
  }
</style>
</head>
<body>
  <div class="iphone-mockup">
    <div class="dynamic-island"></div>
    
    <div class="mini-program-header">
      <div class="header-back" id="btnBack"></div>
      <div class="mini-program-title">活动历史答题</div>
      <div class="mini-program-capsule"></div>
    </div>

    <div class="content-scroll">
      
      <div class="history-card" onclick="goToDetail(3)">
        <div class="card-left">
          <div class="info-line">
            <span class="info-label">答题时间：</span>
            <span class="info-val num">2024-05-02 14:30:12</span>
          </div>
          <div class="info-line">
            <span class="info-label">答题分数：</span>
            <span class="info-val num">100/100</span>
          </div>
          <div class="info-line">
            <span class="info-label">答题用时：</span>
            <span class="info-val num">04分12秒</span>
          </div>
        </div>
        <div class="card-right">
          <span>查看成绩</span><i class="arrow"></i>
        </div>
      </div>

      <div class="history-card" onclick="goToDetail(2)">
        <div class="card-left">
          <div class="info-line">
            <span class="info-label">答题时间：</span>
            <span class="info-val num">2024-05-01 10:15:05</span>
          </div>
          <div class="info-line">
            <span class="info-label">答题分数：</span>
            <span class="info-val num">85/100</span>
          </div>
          <div class="info-line">
            <span class="info-label">答题用时：</span>
            <span class="info-val num">05分34秒</span>
          </div>
        </div>
        <div class="card-right">
          <span>查看成绩</span><i class="arrow"></i>
        </div>
      </div>

      <div class="history-card" onclick="goToDetail(1)">
        <div class="card-left">
          <div class="info-line">
            <span class="info-label">答题时间：</span>
            <span class="info-val num">2024-05-01 09:05:22</span>
          </div>
          <div class="info-line">
            <span class="info-label">答题分数：</span>
            <span class="info-val num">60/100</span>
          </div>
          <div class="info-line">
            <span class="info-label">答题用时：</span>
            <span class="info-val num">08分45秒</span>
          </div>
        </div>
        <div class="card-right">
          <span>查看成绩</span><i class="arrow"></i>
        </div>
      </div>

    </div>

    <div class="home-indicator"></div>
  </div>

  <script>
    // 动态返回逻辑
    document.getElementById('btnBack').addEventListener('click', () => {
      window.location.href = '5.3.1-questionnaire-entrance.html';
    });

    // 点击卡片前往成绩单主页
    window.goToDetail = function(recordId) {
      // 真实开发中可带上 recordId 作为参数拉取对应记录
      window.location.href = '5.3.3-questionnaire-main.html?record=' + recordId;
    };
  </script>
</body>
</html>
