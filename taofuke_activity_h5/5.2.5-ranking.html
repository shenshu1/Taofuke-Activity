<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>5.2.2 排行榜 - 淘福客</title>
<style>
  :root {
    --brand-color: #FF5A5F;
    --bg-color: #F7F8FA;
    --card-bg: #FFFFFF;
    --text-main: #1D1E20;
    --text-sub: #8A8F99;
    --safe-area-top: 44px;
    --safe-area-bottom: 34px;
    --gold: #FFC000;
    --silver: #A3B1C6;
    --bronze: #CD7F32;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background-color: #e0e0e0; display: flex; justify-content: center;
    align-items: center; min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, "PingFang SC", sans-serif;
  }
  
  .iphone-mockup {
    width: 393px; height: 852px; background: var(--bg-color);
    border-radius: 55px; box-shadow: 0 0 0 12px #000, 0 0 0 13px #333, 0 20px 40px rgba(0,0,0,0.2);
    position: relative; overflow: hidden; display: flex; flex-direction: column;
  }
  
  .dynamic-island {
    position: absolute; top: 11px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 35px; background: #000; border-radius: 20px; z-index: 100;
  }

  .mini-program-header {
    padding-top: var(--safe-area-top); height: calc(44px + var(--safe-area-top));
    background: transparent; display: flex; align-items: center; justify-content: center;
    position: absolute; top: 0; left: 0; width: 100%; z-index: 10; color: #fff;
  }
  .header-back {
    position: absolute; left: 15px; top: calc(var(--safe-area-top) + 6px);
    width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .header-back::after {
    content: ''; width: 10px; height: 10px; border-left: 2px solid #fff; border-bottom: 2px solid #fff; transform: rotate(45deg);
  }
  .mini-program-title { font-size: 16px; font-weight: 600; }
  .mini-program-capsule {
    position: absolute; right: 15px; top: calc(var(--safe-area-top) + 6px);
    width: 87px; height: 32px; border-radius: 16px; background: rgba(0,0,0,0.15); border: 0.5px solid rgba(255,255,255,0.2);
  }

  /* 顶部横幅区 */
  .hero-banner {
    width: 100%; height: 260px;
    background: linear-gradient(180deg, #FF5A5F 0%, #FF8E53 100%);
    padding-top: calc(var(--safe-area-top) + 60px);
    display: flex; flex-direction: column; align-items: center; color: #fff;
  }
  .hero-title { font-size: 32px; font-weight: 800; font-style: italic; letter-spacing: 2px; text-shadow: 0 2px 4px rgba(0,0,0,0.2); margin-bottom: 8px; }
  .hero-subtitle { font-size: 14px; opacity: 0.9; }

  /* 我的排名悬浮卡片 */
  .my-rank-card {
    background: var(--card-bg); border-radius: 16px; margin: -40px 16px 16px;
    padding: 16px; display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 8px 24px rgba(0,0,0,0.06); position: relative; z-index: 5;
  }
  .rank-left { display: flex; align-items: center; }
  .rank-num { font-size: 20px; font-weight: bold; color: var(--brand-color); width: 36px; text-align: center; font-family: 'DIN Alternate', sans-serif; }
  .rank-avatar { width: 44px; height: 44px; border-radius: 50%; background: #eee; margin: 0 12px 0 8px; object-fit: cover; }
  .rank-name { font-size: 15px; font-weight: 600; color: var(--text-main); }
  .rank-me-tag { font-size: 10px; color: #fff; background: var(--brand-color); padding: 2px 6px; border-radius: 4px; margin-left: 6px; vertical-align: middle; }
  .rank-right { text-align: right; display: flex; align-items: baseline; justify-content: flex-end; gap: 2px; }
  .rank-steps { font-size: 22px; font-weight: bold; color: var(--text-main); font-family: 'DIN Alternate', sans-serif; }
  .rank-unit { font-size: 12px; color: var(--text-sub); }

  /* 排行榜列表 */
  .list-container {
    background: var(--card-bg); border-radius: 20px 20px 0 0;
    flex: 1; padding: 10px 0 calc(20px + var(--safe-area-bottom));
    min-height: calc(100vh - 300px);
  }
  .list-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; border-bottom: 0.5px solid var(--border-color);
  }
  .list-item:last-child { border-bottom: none; }
  
  /* 前三名专属奖牌样式 */
  .medal {
    width: 28px; height: 28px; border-radius: 50%; color: #fff; font-size: 14px; font-weight: bold;
    display: flex; align-items: center; justify-content: center; font-family: 'DIN Alternate', sans-serif;
  }
  .item-1 .medal { background: linear-gradient(135deg, #FFE259 0%, #FFA751 100%); box-shadow: 0 4px 8px rgba(255, 167, 81, 0.3); }
  .item-2 .medal { background: linear-gradient(135deg, #E2E2E2 0%, #9BA5B5 100%); box-shadow: 0 4px 8px rgba(155, 165, 181, 0.3); }
  .item-3 .medal { background: linear-gradient(135deg, #F1A472 0%, #C37246 100%); box-shadow: 0 4px 8px rgba(195, 114, 70, 0.3); }
  
  /* 普通排名序号 */
  .normal-rank {
    width: 28px; text-align: center; font-size: 16px; font-weight: 600; color: var(--text-sub); font-family: 'DIN Alternate', sans-serif;
  }

  .home-indicator {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 134px; height: 5px; background: #000; border-radius: 100px; z-index: 101;
  }
</style>
</head>
<body>
  <div class="iphone-mockup">
    <div class="dynamic-island"></div>
    
    <div class="mini-program-header">
      <div class="header-back" id="btnBack"></div>
      <div class="mini-program-title">排行榜</div>
      <div class="mini-program-capsule"></div>
    </div>

    <div class="hero-banner">
      <div class="hero-title">排行榜</div>
    </div>

    <div class="my-rank-card">
      <div class="rank-left">
        <div class="rank-num">2</div>
        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ccircle cx='12' cy='12' r='12' fill='%23cccccc'/%3E%3C/svg%3E" class="rank-avatar">
        <span class="rank-name">淘福客用户</span><span class="rank-me-tag">我</span>
      </div>
      <div class="rank-right">
        <div class="rank-steps">124,500</div>
        <div class="rank-unit">步</div>
      </div>
    </div>

    <div style="flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;">
      <div class="list-container">
        
        <div class="list-item item-1">
          <div class="rank-left">
            <div class="medal">1</div>
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ccircle cx='12' cy='12' r='12' fill='%23e0e0e0'/%3E%3C/svg%3E" class="rank-avatar">
            <span class="rank-name">王建国</span>
          </div>
          <div class="rank-right">
            <span class="rank-steps" style="color: var(--gold);">132,100</span>
            <span class="rank-unit">步</span>
          </div>
        </div>

        <div class="list-item item-2">
          <div class="rank-left">
            <div class="medal">2</div>
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ccircle cx='12' cy='12' r='12' fill='%23cccccc'/%3E%3C/svg%3E" class="rank-avatar">
            <span class="rank-name">淘福客用户</span><span class="rank-me-tag">我</span>
          </div>
          <div class="rank-right">
            <span class="rank-steps" style="color: var(--silver);">124,500</span>
            <span class="rank-unit">步</span>
          </div>
        </div>

        <div class="list-item item-3">
          <div class="rank-left">
            <div class="medal">3</div>
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ccircle cx='12' cy='12' r='12' fill='%23e0e0e0'/%3E%3C/svg%3E" class="rank-avatar">
            <span class="rank-name">李淑华</span>
          </div>
          <div class="rank-right">
            <span class="rank-steps" style="color: var(--bronze);">118,200</span>
            <span class="rank-unit">步</span>
          </div>
        </div>

        <div class="list-item">
          <div class="rank-left">
            <div class="normal-rank">4</div>
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ccircle cx='12' cy='12' r='12' fill='%23f5f5f5'/%3E%3C/svg%3E" class="rank-avatar">
            <span class="rank-name">张伟</span>
          </div>
          <div class="rank-right"><span class="rank-steps">105,600</span><span class="rank-unit">步</span></div>
        </div>

        <div class="list-item">
          <div class="rank-left">
            <div class="normal-rank">5</div>
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ccircle cx='12' cy='12' r='12' fill='%23f5f5f5'/%3E%3C/svg%3E" class="rank-avatar">
            <span class="rank-name">陈明</span>
          </div>
          <div class="rank-right"><span class="rank-steps">98,300</span><span class="rank-unit">步</span></div>
        </div>

      </div>
    </div>

    <div class="home-indicator"></div>
  </div>

  <script>
    // 零延迟返回到主页
    document.getElementById('btnBack').addEventListener('click', () => { 
      window.location.href = '5.2.2-walking-main.html';
    });
  </script>
</body>
</html>
